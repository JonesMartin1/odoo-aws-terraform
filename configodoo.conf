# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURACIÓN DE ODOO (odoo.conf)
#
# Este archivo define los parámetros con los que arranca Odoo.
# Se monta dentro del contenedor en /etc/odoo/odoo.conf
# ─────────────────────────────────────────────────────────────────────────────
[options]

# Carpeta donde Odoo busca módulos/extensiones adicionales
# Esta ruta corresponde a la carpeta "addons/" montada en docker-compose.yml
addons_path = /mnt/extra-addons

# Carpeta donde Odoo guarda archivos internos (adjuntos, reportes, etc.)
data_dir = /var/lib/odoo

# Contraseña maestra del panel de administración de Odoo
# Se pide al crear o eliminar bases de datos desde la interfaz web
admin_passwd = admin123

# ── Conexión a la base de datos ───────────────────────────────────────────────
# Estos datos tienen que coincidir con los definidos en docker-compose.yml

# Nombre del host de la base de datos
# En Docker, los servicios se comunican por su nombre: "db" es el nombre del contenedor
db_host = db

# Puerto estándar de PostgreSQL
db_port = 5432

# Usuario de la base de datos (definido en POSTGRES_USER en docker-compose.yml)
db_user = odoo

# Contraseña del usuario (definida en POSTGRES_PASSWORD en docker-compose.yml)
db_password = odoo_pass
oo_pass